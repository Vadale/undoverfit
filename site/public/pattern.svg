<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <g fill="#1a1a1a" stroke="#1a1a1a" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">

    <!-- Optimal fit: parabola top-left, dots hugging it closely -->
    <path d="M 40 180 Q 160 -10 280 180" fill="none" />
    <circle cx="50"  cy="160" r="1.6" />
    <circle cx="75"  cy="118" r="1.6" />
    <circle cx="100" cy="88"  r="1.6" />
    <circle cx="125" cy="65"  r="1.6" />
    <circle cx="155" cy="58"  r="1.6" />
    <circle cx="185" cy="70"  r="1.6" />
    <circle cx="215" cy="103" r="1.6" />
    <circle cx="245" cy="138" r="1.6" />
    <circle cx="270" cy="173" r="1.6" />

    <!-- Overfit: wiggly cubic spline top-right, dots on every wiggle -->
    <path d="M 330 100 C 360 40, 380 130, 410 80 C 440 30, 470 130, 500 70 C 530 30, 560 100, 580 75" fill="none" />
    <circle cx="340" cy="95"  r="1.6" />
    <circle cx="370" cy="80"  r="1.6" />
    <circle cx="400" cy="92"  r="1.6" />
    <circle cx="430" cy="62"  r="1.6" />
    <circle cx="460" cy="98"  r="1.6" />
    <circle cx="490" cy="78"  r="1.6" />
    <circle cx="520" cy="58"  r="1.6" />
    <circle cx="555" cy="85"  r="1.6" />

    <!-- Underfit: straight line bottom, dots scattered with visible residuals -->
    <line x1="60" y1="340" x2="540" y2="280" />
    <circle cx="70"  cy="335" r="1.6" />
    <circle cx="105" cy="370" r="1.6" />
    <circle cx="140" cy="320" r="1.6" />
    <circle cx="175" cy="355" r="1.6" />
    <circle cx="215" cy="295" r="1.6" />
    <circle cx="255" cy="345" r="1.6" />
    <circle cx="295" cy="285" r="1.6" />
    <circle cx="335" cy="325" r="1.6" />
    <circle cx="375" cy="290" r="1.6" />
    <circle cx="415" cy="320" r="1.6" />
    <circle cx="455" cy="275" r="1.6" />
    <circle cx="495" cy="305" r="1.6" />

    <!-- A few outliers far from any curve -->
    <circle cx="22"  cy="55"  r="1.6" />
    <circle cx="312" cy="220" r="1.6" />
    <circle cx="588" cy="220" r="1.6" />
    <circle cx="22"  cy="378" r="1.6" />

  </g>
</svg>
