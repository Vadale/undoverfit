<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32">
  <style>
    :root {
      --paper: #f4f1e8;
      --ink: #0e2236;
      --ink-2: #5a6878;
      --teal: #1b6e70;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --paper: #0e1a26;
        --ink: #ede7d8;
        --ink-2: #8e9aa8;
        --teal: #5dd3c1;
      }
    }
    .line { stroke: var(--ink-2); opacity: 0.9; }
    .curve { stroke: var(--teal); fill: none; }
    .dot { fill: var(--paper); stroke: var(--ink); }
  </style>
  <line class="line" x1="4" y1="16" x2="60" y2="16" stroke-width="1.2" stroke-linecap="round" />
  <path class="curve" d="M 10 20 Q 16 4 22 10 Q 28 24 34 22 Q 40 4 46 12 Q 52 22 58 16"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
  <g class="dot" stroke-width="1.2">
    <circle cx="10" cy="20" r="2.4" />
    <circle cx="22" cy="10" r="2.4" />
    <circle cx="34" cy="22" r="2.4" />
    <circle cx="46" cy="12" r="2.4" />
    <circle cx="58" cy="16" r="2.4" />
  </g>
</svg>
