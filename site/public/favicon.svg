<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 32">
  <style>
    :root {
      --paper: #f4f1e8;
      --ink: #0e2236;
      --ink-2: #5a6878;
      --teal: #1b6e70;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --paper: #0e1a26;
        --ink: #ede7d8;
        --ink-2: #8e9aa8;
        --teal: #5dd3c1;
      }
    }
    .line { stroke: var(--ink-2); }
    .curve { stroke: var(--teal); fill: none; }
    .dot { fill: var(--paper); stroke: var(--ink); }
  </style>
  <line class="line" x1="6" y1="16" x2="94" y2="16" stroke-width="1" stroke-opacity="0.9" stroke-linecap="round"/>
  <path class="curve" d="M 14 18 Q 23 6 32 12 Q 41 22 50 20 Q 59 6 68 12 Q 77 20 86 16"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <g class="dot" stroke-width="1.1">
    <circle cx="14" cy="18" r="2.2"/>
    <circle cx="32" cy="12" r="2.2"/>
    <circle cx="50" cy="20" r="2.2"/>
    <circle cx="68" cy="12" r="2.2"/>
    <circle cx="86" cy="16" r="2.2"/>
  </g>
</svg>
