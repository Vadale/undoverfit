<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 24">
  <g fill="none" stroke="#4a7570" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- ∪  U opening upward (under-fit), arc peaks below center -->
    <path d="M 6 7 Q 16 23 26 7" />
    <!-- ∩  U opening downward (over-fit), arc peaks above center -->
    <path d="M 6 17 Q 16 1 26 17" />
  </g>
  <!-- Three dots on the ∩ curve (over-fit hitting every point) -->
  <g fill="#4a7570">
    <circle cx="11" cy="11" r="1.4" />
    <circle cx="16" cy="9" r="1.4" />
    <circle cx="21" cy="11" r="1.4" />
  </g>
</svg>
